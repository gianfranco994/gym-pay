<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="GymPay - Sistema de gestión de mensualidades para gimnasio. Controla pagos, vencimientos y analíticas." />
  <title>GymPay - Gestión de Mensualidades</title>
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <script>
    // Pre-hide sidebar instantly to avoid 1-second flash on initial load
    if (window.location.hash.includes('/portal') || window.location.hash.includes('/login')) {
      document.documentElement.classList.add('public-route');
    }
  </script>
  <style>
    html.public-route .sidebar, 
    html.public-route .mobile-menu-btn { 
      display: none !important; 
    }
    html.public-route .main-content {
      margin-left: 0 !important;
    }
  </style>
</head>
<body>
  <div id="app">
    <aside id="sidebar" class="sidebar"></aside>
    <main id="main-content" class="main-content">
      <div id="page-container" class="page-container"></div>
    </main>
  </div>
  <div id="modal-root"></div>
  <div id="toast-root" class="toast-container"></div>
  <script type="module" src="/src/main.js"></script>
</body>
</html>
